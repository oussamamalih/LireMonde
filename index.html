<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LireMonde - Discover Books</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">📚 LireMonde</div>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li>
          <a href="alire.html">To Read <span id="toReadCount">0</span></a>
        </li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search books..." />
      </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-left">
        <h1>Find your new book<br />with LireMonde</h1>
        <p class="hero-subtitle">
          <span class="underline-text">
            LireMonde is an easy, efficient, and sustainable way<br />
            to get rid of books and media you no longer need.
          </span>
        </p>
        <a href="#books" class="hero-btn">
          Scroll down to see our books
          <span class="arrow">↓</span>
        </a>
      </div>
      <div class="hero-right">
        <!-- Right panel is empty / decorative -->
      </div>
    </header>

    <!-- Main Content -->
    <main class="container">
      <!-- Filter Section -->
      <section class="filters">
        <h2>Filter by Genre</h2>
        <div id="genreFilters" class="genre-buttons">
          <button class="genre-btn active" data-genre="all">All</button>
        </div>
      </section>

      <!-- Books Grid -->
      <section class="books-section">
        <h2>All Books</h2>
        <div id="booksGrid" class="books-grid">
          <!-- Books will be loaded here by JavaScript -->
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 LireMonde - Your Digital Reading Space</p>
    </footer>

    <!-- Modal -->
    <div id="bookModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
