<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - LireMonde</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">📚 LireMonde</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="alire.html">To Read</a></li>
        <li><a href="admin.html" class="active">Admin</a></li>
      </ul>
    </nav>

    <!-- Header -->
    <header class="page-header">
      <h1>Admin Dashboard</h1>
      <p>Manage your book collection</p>
    </header>

    <!-- Main Content -->
    <main class="container">
      <!-- Add Book Form -->
      <section class="admin-form-section">
        <h2 id="formTitle">Add New Book</h2>
        <form id="bookForm" class="admin-form">
          <input type="hidden" id="bookId" />
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required />
          </div>
          <div class="form-group">
            <label for="author">Author</label>
            <input type="text" id="author" required />
          </div>
          <div class="form-group">
            <label for="genre">Genre</label>
            <select id="genre" required>
              <option value="Classic">Classic</option>
              <option value="Science Fiction">Science Fiction</option>
              <option value="Drama">Drama</option>
              <option value="Fantasy">Fantasy</option>
            </select>
          </div>
          <div class="form-group">
            <label for="cover">Cover Image URL</label>
            <input
              type="url"
              id="cover"
              placeholder="https://example.com/image.jpg"
              required
            />
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="4" required></textarea>
          </div>
          <div class="form-buttons">
            <button type="submit" id="submitBtn" class="btn btn-primary">
              Add Book
            </button>
            <button
              type="button"
              id="cancelBtn"
              class="btn btn-secondary"
              style="display: none"
            >
              Cancel
            </button>
          </div>
        </form>
      </section>

      <!-- Books Table -->
      <section class="admin-table-section">
        <h2>Book Collection</h2>
        <div class="table-container">
          <table id="booksTable" class="admin-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Cover</th>
                <th>Title</th>
                <th>Author</th>
                <th>Genre</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- Table rows loaded by JS -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>© 2026 LireMonde - Your Digital Reading Space</p>
    </footer>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
  </body>
</html>
