<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadSphere - À lire</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <nav class="navbar">

        <a href="index.html" class="logo">

        <ul class="nav-links">

      <!-- Books Grid -->
      <div class="book-grid" id="alire-grid"></div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="alire-empty">

        <p>Browse the home page and add books you want to read!</p>
        <a href="index.html" class="btn btn-primary mt-2">Browse Books</a>
      </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal-content"></div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
